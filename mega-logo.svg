<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 68">
  <defs>
    <radialGradient id="gball" cx="36%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#66aaff"/>
      <stop offset="40%" stop-color="#1155dd"/>
      <stop offset="100%" stop-color="#001877"/>
    </radialGradient>
    <clipPath id="globeClip"><circle cx="32" cy="33" r="29"/></clipPath>
    <filter id="globeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000066"/>
    </filter>
  </defs>

  <!-- Blue globe sphere -->
  <circle cx="32" cy="33" r="29" fill="url(#gball)" filter="url(#globeShadow)"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="33" rx="29" ry="12" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" clip-path="url(#globeClip)"/>
  <ellipse cx="32" cy="33" rx="29" ry="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" clip-path="url(#globeClip)"/>
  <!-- Longitude lines -->
  <ellipse cx="32" cy="33" rx="15" ry="29" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" clip-path="url(#globeClip)"/>
  <line x1="32" y1="4" x2="32" y2="62" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" clip-path="url(#globeClip)"/>
  <!-- Specular highlight -->
  <ellipse cx="22" cy="19" rx="11" ry="6.5" fill="white" opacity="0.4" transform="rotate(-28 22 19)"/>
  <circle cx="18" cy="16" r="4" fill="white" opacity="0.2"/>

  <!-- MEGA -->
  <text x="72" y="28"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="22" font-weight="900" font-style="italic"
        fill="#5599FF" letter-spacing="1">MEGA</text>

  <!-- MILLIONS -->
  <text x="72" y="58"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="20" font-weight="900" font-style="italic"
        fill="#FFD000" letter-spacing="0.5">MILLIONS</text>

  <!-- Gold star accents -->
  <path d="M200,6 l2.2,6.8 7.2,0 -5.8,4.2 2.2,6.8 -5.8,-4.2 -5.8,4.2 2.2,-6.8 -5.8,-4.2 7.2,0Z" fill="#FFD000"/>
  <path d="M207,38 l1.4,4.3 4.5,0 -3.6,2.7 1.4,4.3 -3.7,-2.7 -3.7,2.7 1.4,-4.3 -3.6,-2.7 4.5,0Z" fill="#FFD000" opacity="0.8"/>
</svg>
