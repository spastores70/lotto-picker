<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 68">
  <defs>
    <radialGradient id="rball" cx="36%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ff8877"/>
      <stop offset="40%" stop-color="#dd1122"/>
      <stop offset="100%" stop-color="#880010"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ballClip"><circle cx="32" cy="33" r="29"/></clipPath>
    <filter id="ballShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000066"/>
    </filter>
  </defs>

  <!-- Red sphere -->
  <circle cx="32" cy="33" r="29" fill="url(#rball)" filter="url(#ballShadow)"/>
  <!-- Horizontal white band (lottery-ball style) -->
  <rect x="3" y="28" width="58" height="10" fill="white" opacity="0.18" clip-path="url(#ballClip)"/>
  <!-- Specular highlight -->
  <ellipse cx="22" cy="19" rx="11" ry="6.5" fill="white" opacity="0.42" transform="rotate(-28 22 19)"/>
  <circle cx="18" cy="16" r="4" fill="white" opacity="0.2"/>

  <!-- POWER -->
  <text x="72" y="28"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="19" font-weight="900" font-style="italic"
        fill="#FF2233" letter-spacing="1.2">POWER</text>

  <!-- BALL -->
  <text x="72" y="58"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="30" font-weight="900" font-style="italic"
        fill="#FF2233" letter-spacing="3">BALL</text>

  <!-- Gold star accents -->
  <path d="M200,6 l2.2,6.8 7.2,0 -5.8,4.2 2.2,6.8 -5.8,-4.2 -5.8,4.2 2.2,-6.8 -5.8,-4.2 7.2,0Z" fill="#FFD700"/>
  <path d="M207,38 l1.4,4.3 4.5,0 -3.6,2.7 1.4,4.3 -3.7,-2.7 -3.7,2.7 1.4,-4.3 -3.6,-2.7 4.5,0Z" fill="#FFD700" opacity="0.8"/>
</svg>
