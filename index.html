<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#04070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Joe Lucky" />
  <title>Joe Lucky Lotto Picks</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Background stage lighting -->
    <div class="spotlights">
      <!-- Blue fan beams from upper-left -->
      <div class="beam beam-b1"></div>
      <div class="beam beam-b2"></div>
      <div class="beam beam-b3"></div>
      <div class="beam beam-b4"></div>
      <div class="beam beam-b5"></div>
      <!-- Gold beams from upper-right -->
      <div class="beam beam-g1"></div>
      <div class="beam beam-g2"></div>
      <!-- Ambient color pools -->
      <div class="ambient ambient-blue"></div>
      <div class="ambient ambient-red-side"></div>
      <div class="ambient ambient-red-bottom"></div>
      <div class="ambient ambient-gold"></div>
      <!-- Halftone dot textures -->
      <div class="dots dots-left"></div>
      <div class="dots dots-right"></div>
      <!-- Stage floor light -->
      <div class="floor-light"></div>
    </div>

    <!-- Header logos -->
    <div class="logos">
      <img src="powerball-logo.svg" alt="Powerball" class="logo-img" />
      <div class="logo-divider">|</div>
      <img src="mega-logo.svg" alt="Mega Millions" class="logo-img" />
    </div>

    <!-- Title -->
    <div class="title-block">
      <h1 class="day-label" id="dayLabel">SUNDAY</h1>
      <h1 class="title-main">LUCKY LOTTO</h1>
      <h1 class="title-picks">&#9733; PICKS &#9733;</h1>
      <p class="subtitle">Your lucky numbers. Your lucky day.</p>
    </div>

    <!-- Game selector -->
    <div class="section-label">SELECT GAME</div>
    <div class="game-selector">
      <button class="game-btn active" id="btnPowerball" onclick="selectGame('powerball')">POWERBALL</button>
      <button class="game-btn" id="btnMega" onclick="selectGame('mega')">MEGA MILLIONS</button>
    </div>
    <div class="game-rule" id="gameRule">Pick 5 white balls + 1 red ball or mega ball</div>

    <!-- Balls display -->
    <div class="section-label balls-label">&#9733; YOUR NUMBERS &#9733;</div>
    <div class="stage">
      <div class="stage-glow"></div>
      <div class="balls-container" id="ballsContainer">
        <div class="ball white-ball" id="b1"><span class="ball-text">?</span></div>
        <div class="ball white-ball" id="b2"><span class="ball-text">?</span></div>
        <div class="ball white-ball" id="b3"><span class="ball-text">?</span></div>
        <div class="ball white-ball" id="b4"><span class="ball-text">?</span></div>
        <div class="ball white-ball" id="b5"><span class="ball-text">?</span></div>
        <div class="ball special-ball" id="b6"><span class="ball-text">?</span></div>
      </div>
    </div>

    <!-- Generate button -->
    <button class="generate-btn" onclick="generateNumbers()">
      GENERATE NUMBERS <span class="dice">&#9861;</span>
    </button>

    <!-- Action buttons -->
    <div class="actions">
      <button class="action-btn" onclick="savePick()">
        <span class="action-icon">&#9733;</span>
        <span>SAVE PICK</span>
      </button>
      <button class="action-btn" onclick="copyPick()">
        <span class="action-icon">&#10697;</span>
        <span>COPY PICK</span>
      </button>
      <button class="action-btn" onclick="showHistory()">
        <span class="action-icon">&#8987;</span>
        <span>HISTORY</span>
      </button>
      <button class="action-btn" onclick="showQR()">
        <span class="action-icon">
          <svg class="qr-svg-icon" width="26" height="26" viewBox="0 0 26 26" fill="currentColor">
            <rect x="1" y="1" width="10" height="10" rx="1.5" fill="none" stroke="#ffd700" stroke-width="2"/>
            <rect x="4" y="4" width="4" height="4" rx="0.5"/>
            <rect x="15" y="1" width="10" height="10" rx="1.5" fill="none" stroke="#ffd700" stroke-width="2"/>
            <rect x="18" y="4" width="4" height="4" rx="0.5"/>
            <rect x="1" y="15" width="10" height="10" rx="1.5" fill="none" stroke="#ffd700" stroke-width="2"/>
            <rect x="4" y="18" width="4" height="4" rx="0.5"/>
            <rect x="15" y="15" width="4" height="4" rx="0.5"/>
            <rect x="21" y="15" width="4" height="4" rx="0.5"/>
            <rect x="15" y="21" width="4" height="4" rx="0.5"/>
            <rect x="21" y="21" width="4" height="4" rx="0.5"/>
          </svg>
        </span>
        <span>QR CODE</span>
      </button>
    </div>

    <!-- Daily pick banner -->
    <div class="daily-banner">
      <div class="daily-left">
        <div class="sun-icon">&#9728;</div>
        <div class="daily-text">
          <div class="daily-title">DAILY LUCKY PICK</div>
          <div class="daily-sub">Get one lucky pick per game per day.</div>
        </div>
      </div>
      <button class="daily-btn" onclick="getDailyPick()">&#127873; GET TODAY'S PICK</button>
    </div>

    <!-- QR code modal -->
    <div class="modal-overlay qr-overlay" id="qrModal" onclick="closeQR(event)">
      <div class="qr-card">
        <div class="qr-card-header">
          <span id="qrGameLabel">POWERBALL</span>
          <button class="modal-close" onclick="closeQRBtn()">&#10005;</button>
        </div>
        <div class="qr-scan-area">
          <div id="qrContainer"></div>
        </div>
        <div class="qr-numbers" id="qrNumbers"></div>
        <p class="qr-instruction">Show this QR code at the store to scan</p>
      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- History modal -->
    <div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
      <div class="modal">
        <div class="modal-header">
          <span>PICK HISTORY</span>
          <button class="modal-close" onclick="closeHistoryBtn()">&#10005;</button>
        </div>
        <div class="modal-body" id="historyList"></div>
        <button class="clear-btn" onclick="clearHistory()">CLEAR HISTORY</button>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
